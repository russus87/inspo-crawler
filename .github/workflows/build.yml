name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow the release job to create a GitHub Release.
permissions:
  contents: write

jobs:
  # Fast feedback on every push / PR.
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  # Windows, macOS (universal) and Linux desktop builds.
  desktop:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            args: ''
          - os: windows-latest
            name: windows
            args: ''
          - os: macos-latest
            name: macos
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.name == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall -y tauri-cli

      - name: Build
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inspo-crawler-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/*/release/bundle/**/*

  # Arch Linux native binary (built inside an Arch container).
  arch:
    needs: check
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install deps
        run: |
          pacman -Syu --noconfirm --needed base-devel git curl wget file \
            openssl webkit2gtk-4.1 gtk3 libappindicator-gtk3 librsvg rustup nodejs
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: rustup default stable
      - name: Install Tauri CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y tauri-cli || cargo install tauri-cli --version '^2.0' --locked
      - name: Build (binary only)
        run: cargo tauri build --no-bundle
      - name: Package binary
        run: |
          mkdir -p dist
          cp src-tauri/target/release/inspo-crawler dist/
          tar -czf dist/inspo-crawler-arch-x86_64.tar.gz -C src-tauri/target/release inspo-crawler
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inspo-crawler-arch
          path: dist/*

  # Attach every built artifact to a GitHub Release when a tag is pushed.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [desktop, arch]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
